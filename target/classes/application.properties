spring.application.name=verification
server.port=8080

# Database ? REPLACE password with the one you set during PostgreSQL install
spring.datasource.url=jdbc:postgresql://localhost:5432/warehouse_db
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=15

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.logging.level.org.springframework.security=DEBUG

# Batch tuning
spring.jpa.properties.hibernate.jdbc.batch_size=5000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# File uploads
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=250MB

# AWS S3 (only needed if you demo the POD feature)
aws.s3.bucket-name=logistics-pod-records-bucket
aws.region=ap-south-1

